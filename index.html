<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USC Coop Mart</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22311d">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coop Mart">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #22311d;
    font-family: Arial, sans-serif;
  }
  #loader {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    z-index: 2;
    transition: opacity 0.3s ease;
  }
  #loader .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(255,255,255,0.25);
    border-top-color: #d4a73a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #app-frame {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 1;
  }
</style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div>Loading USC Coop Mart…</div>
  </div>

  <iframe
    id="app-frame"
    src="https://script.google.com/a/macros/usc.edu.ph/s/AKfycbx9yiNo8C22RWoKwVp59kQ9J81IvmXYHwKqXSRHcnr-3-XEwa6XbG6QbSjcGT-uohbf/exec"
    title="USC Coop Mart"
    allow="clipboard-write"
    onload="document.getElementById('loader').style.opacity='0'; setTimeout(function(){document.getElementById('loader').style.display='none';}, 300);">
  </iframe>

  <script>
    // The embedded app can't navigate us directly (Google's sandbox blocks
    // that for third-party wrapped content) — instead it sends us a message
    // asking us to change our OWN iframe's src, which we're allowed to do.
    window.addEventListener('message', function (event) {
      if (event.data && event.data.type === 'ucm-navigate' && event.data.url) {
        document.getElementById('app-frame').src = event.data.url;
      }
    });

    // Register service worker so the browser offers "Add to Home Screen" /
    // install prompt. Doesn't cache the order form itself (see sw.js notes).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function (err) {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>

</body>
</html>
